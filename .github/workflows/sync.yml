name: NBA Bet Sync

on:
  # Runs every 15 minutes during NBA playoff hours (April–June)
  # 17:00–23:59 UTC = 1pm–7pm ET  |  00:00–05:00 UTC = 8pm–1am ET
  schedule:
    - cron: '*/15 17-23 * 4-6 *'
    - cron: '*/15 0-5 * 4-6 *'

  workflow_dispatch:

jobs:
  sync:
    name: Sync games & score bets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Run sync
        working-directory: worker
        run: python run.py
        env:
          BALL_DONT_LIE_API_KEY: ${{ secrets.BALL_DONT_LIE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
