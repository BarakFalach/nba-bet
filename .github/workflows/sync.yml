name: NBA Bet Sync

on:
  # Runs twice daily during NBA playoff season (April–June):
  #   06:00 UTC = 09:00 Israel (IDT, UTC+3)
  #   23:00 UTC = 02:00 Israel (IDT, UTC+3)
  schedule:
    - cron: '0 6 * 4-6 *'
    - cron: '0 23 * 4-6 *'

  workflow_dispatch:

jobs:
  sync:
    name: Sync games & score bets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Run sync
        working-directory: worker
        run: python run.py
        env:
          BALL_DONT_LIE_API_KEY: ${{ secrets.BALL_DONT_LIE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
